version: '3.8'

services:
  backend:
    build: .
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - JWT_SECRET=ludo-super-secret-key
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgres://ludo:ludopass@db:5432/ludo
    depends_on:
      - redis
      - db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=ludo
      - POSTGRES_PASSWORD=ludopass
      - POSTGRES_DB=ludo
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
